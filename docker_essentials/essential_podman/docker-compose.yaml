services:
  serverlessdev:
    container_name: serverlessdev
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - local-dev-network
    volumes:
      - ~/Desktop/Projects:/home/euewrqe/projects
      - "/run/user/1000/podman/podman.sock:var/run/docker.sock"
    environment:
      - AWS_PROFILE=localstack
      - env=loc

  localstack:
    container_name: "${LOCALSTACK_DOCKER_NAME:-localstack-main}"
    image: localstack/localstack:3.8.1
    networks:
      - local-dev-network
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    environment:
      - DEBUG=1
    volumes:
      - "localstack-volume:/var/lib/localstack"
      - "/run/user/1000/podman/podman.sock:/var/run/docker.sock"

  postgres:
    container_name: postgres-16
    image: postgres:16.4
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=mydatabase
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
    networks:
      - local-dev-network
    volumes:
      - type: volume
        source: postgres-volume
        target: /var/lib/postgresql/data
      - type: volume
        source: db-init-volume
        target: /docker-entrypoint-initdb.d

volumes:
  localstack-volume:
    external: true
    name: "localstack-volume"
  postgres-volume:
    external: true
    name: "postgres-volume"
  db-init-volume:
    external: true
    name: "db-init-volume"
networks:
  local-dev-network:
    name: local-dev-network